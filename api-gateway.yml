spring:
  application:
    name: api-gateway

  # --- ADD THIS SECTION ---
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
        provider:
          google:
            issuer-uri: https://accounts.google.com
  # ------------------------

  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns:
              - "https://client-uptime-frontend.vercel.app"
              - "https://*.vercel.app"
              - "http://localhost:5173"
            allowedMethods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
            allowedHeaders: "*"
            allowCredentials: true

      routes:
        - id: monitoring-service
          uri: https://sentinel-monitoring-latest.onrender.com
          predicates:
            - Path=/api/monitoring/**
            # ADD THIS LINE: Tell the Gateway NOT to forward auth requests to the backend
            - "Header=X-Skip-Proxy, .*"
            # OR better, use a negative lookahead in the path if your version supports it,
            # but the simplest fix is to ensure the Security Filter takes priority.
          filters:
            - TokenRelay=
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials
            - PreserveHostHeader

server:
  forward-headers-strategy: framework
  port: ${PORT:8080}
  netty:
    connection-timeout: 10s

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}